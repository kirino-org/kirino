{{ define "title" }}About Kiririn{{ end }}

{{ define "content" }}
<h2>Kiririn</h2>

<table>
    <tr>
        <th>Go Version</th>
        <td>{{ GoVersion }}</td>
    </tr>
    <tr>
        <th>Running Goroutines</th>
        <td>{{ GoNumGoroutine }}</td>
    </tr>
    <tr>
        <th>CPUs</th>
        <td>{{ GoNumCPU }}</td>
    </tr>
</table>

<details>
    <summary>
        License
    </summary>
    <div id="agplv3-license">
        <pre>{{ .Data }}</pre>
    </div>
</details>
{{ end }}
