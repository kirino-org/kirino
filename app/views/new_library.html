{{ define "title" }}New Library{{ end }}

{{ define "content" }}
<h2>New Library</h2>
<form method="post" action="{{ .Config.BaseURL }}/libraries/new">
    <p>
        <label for="fetcher">Media Type</label><br>
        <select name="fetcher" id="fetcher">
            <option selected disabled>
                Select a media type
            </option>
            <option>Anime</option>
        </select>
    </p>

    <p>
        <label for="name">Name</label><br>
        <input type="text" name="name" id="name" />
    </p>

    <p>
        <input type="submit" value="Create" />
    </p>
</form>
{{ end }}
