{{ define "title" }}Search results{{ end }}

{{ define "content" }}
<table>
    {{ $ = . }}
    {{ range .Data }}
        <tr>
            <td>
                <img src="{{ .Image }}" style="width:10rem" />
            </td>
            <td>
                <h4>{{ .Title }}</h4>
                <p>{{ .Description }}</p>
            </td>
            <td>
                <button onclick="addFeed('{{.ID}}')">Add</button>
            </td>
        </tr>
    {{ end }}
</table>

<script src="/app/assets/main.js"></script>
{{ end }}
